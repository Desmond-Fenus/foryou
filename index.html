<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Для тебя 💕</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Caveat:wght@500;600;700&family=Montserrat:wght@400;500;600&display=swap&subset=cyrillic,cyrillic-ext"
      rel="stylesheet" />
    <style>
      /* =====================================================================
   ПАЛИТРА И ТОКЕНЫ
   ===================================================================== */
      :root {
        --blush: #fff2f6;
        --petal: #ffd9e6;
        --lavender: #efe6ff;
        --cream: #fffaf6;
        --rose: #ff7aa8;
        --rose-deep: #e15c86;
        --plum: #7a3d5d;
        --plum-soft: #9b6585;
        --glass: rgba(255, 255, 255, 0.55);
        --glass-line: rgba(255, 255, 255, 0.85);
        --shadow: 0 18px 40px rgba(225, 92, 134, 0.22);
        --shadow-sm: 0 8px 22px rgba(225, 92, 134, 0.18);
        --font-script: "Marck Script", "Caveat", cursive;
        --font-hand: "Caveat", "Marck Script", cursive;
        --font-ui: "Montserrat", system-ui, sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        height: 100%;
      }
      body {
        font-family: var(--font-ui);
        color: var(--plum);
        overflow: hidden;
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            120% 120% at 15% 10%,
            var(--lavender) 0%,
            transparent 55%
          ),
          radial-gradient(
            120% 120% at 85% 90%,
            var(--petal) 0%,
            transparent 55%
          ),
          linear-gradient(
            160deg,
            var(--blush) 0%,
            var(--cream) 50%,
            var(--petal) 120%
          );
        background-size: 200% 200%;
        animation: drift 22s ease-in-out infinite;
      }
      @keyframes drift {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      /* =====================================================================
   ФОНОВЫЕ ЛЕПЕСТКИ / СЕРДЕЧКИ / КОШЕЧКИ
   ===================================================================== */
      .sky {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 1;
      }
      .float {
        position: absolute;
        top: -12%;
        font-size: 1.6rem;
        opacity: 0;
        animation: fall linear infinite;
        will-change: transform;
        filter: drop-shadow(0 3px 4px rgba(225, 92, 134, 0.18));
      }
      @keyframes fall {
        0% {
          transform: translateY(-10vh) rotate(0deg) translateX(0);
          opacity: 0;
        }
        10% {
          opacity: 0.9;
        }
        90% {
          opacity: 0.9;
        }
        100% {
          transform: translateY(112vh) rotate(360deg) translateX(40px);
          opacity: 0;
        }
      }

      /* Кошечка, выглядывающая из угла */
      .kitty {
        position: fixed;
        left: 14px;
        bottom: -6px;
        z-index: 20;
        font-size: clamp(2.4rem, 8vw, 3.4rem);
        animation: peek 5s ease-in-out infinite;
        cursor: pointer;
        user-select: none;
        background: none;
        border: none;
        padding: 6px;
        filter: drop-shadow(0 6px 8px rgba(225, 92, 134, 0.25));
        transition: transform 0.15s ease;
      }
      .kitty:hover {
        filter: drop-shadow(0 8px 10px rgba(225, 92, 134, 0.35));
      }
      .kitty:active {
        transform: scale(0.88);
      }
      .kitty:focus-visible {
        outline: 3px solid var(--rose);
        outline-offset: 4px;
        border-radius: 14px;
      }
      .kitty.mew {
        animation: mew 0.55s ease;
      }
      @keyframes peek {
        0%,
        100% {
          transform: translateY(14px) rotate(-4deg);
        }
        50% {
          transform: translateY(-4px) rotate(4deg);
        }
      }
      @keyframes mew {
        0% {
          transform: translateY(14px) scale(1) rotate(-4deg);
        }
        30% {
          transform: translateY(-14px) scale(1.18, 0.86) rotate(3deg);
        }
        55% {
          transform: translateY(-2px) scale(0.92, 1.12) rotate(-3deg);
        }
        100% {
          transform: translateY(14px) scale(1) rotate(-4deg);
        }
      }
      .mew-bubble {
        position: fixed;
        z-index: 25;
        pointer-events: none;
        font-family: var(--font-hand);
        font-weight: 700;
        font-size: clamp(1.1rem, 4.5vw, 1.5rem);
        color: var(--rose-deep);
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.75);
        animation: mewFloat 1.1s ease-out forwards;
      }
      @keyframes mewFloat {
        0% {
          opacity: 0;
          transform: translateY(6px) scale(0.7);
        }
        25% {
          opacity: 1;
          transform: translateY(-6px) scale(1.05);
        }
        100% {
          opacity: 0;
          transform: translateY(-48px) scale(1);
        }
      }

      /* =====================================================================
   ИНТРО С КОМПЛИМЕНТОМ
   ===================================================================== */
      .intro {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 8vw;
        background: radial-gradient(
          140% 120% at 50% 25%,
          var(--cream) 0%,
          var(--blush) 45%,
          var(--petal) 110%
        );
        transition:
          opacity 1s ease,
          transform 1s ease;
      }
      .intro.hide {
        opacity: 0;
        transform: scale(1.06);
        pointer-events: none;
      }

      .intro .seal {
        font-size: clamp(3rem, 14vw, 5.2rem);
        margin-bottom: 0.4em;
        animation:
          beat 1.6s ease-in-out infinite,
          bloomIn 1.1s 0.1s ease both;
      }
      .intro .compliment {
        font-family: var(--font-script);
        font-size: clamp(1.9rem, 7vw, 3.4rem);
        line-height: 1.25;
        color: var(--plum);
        max-width: 18ch;
        text-wrap: balance;
        opacity: 0;
        animation: bloomIn 1.2s 0.55s ease both;
      }
      .intro .enter {
        margin-top: 2.2em;
        font-family: var(--font-hand);
        font-size: clamp(1.1rem, 4.5vw, 1.5rem);
        color: var(--rose-deep);
        opacity: 0;
        animation:
          bloomIn 1s 1.7s ease both,
          sway 2.4s 2.7s ease-in-out infinite;
      }
      .intro .enter b {
        font-weight: 700;
      }
      @keyframes bloomIn {
        0% {
          opacity: 0;
          transform: translateY(18px) scale(0.94);
          filter: blur(6px);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }
      @keyframes beat {
        0%,
        100% {
          transform: scale(1);
        }
        30% {
          transform: scale(1.12);
        }
      }
      @keyframes sway {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(6px);
        }
      }

      /* =====================================================================
   ГЛАВНЫЙ ЭКРАН
   ===================================================================== */
      .stage {
        position: relative;
        z-index: 5;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(0.7rem, 2.6vh, 1.6rem);
        padding: clamp(1rem, 4vw, 2rem);
        text-align: center;
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 1.1s ease,
          transform 1.1s ease;
      }
      .stage.show {
        opacity: 1;
        transform: translateY(0);
      }

      .title {
        font-family: var(--font-script);
        font-size: clamp(2.2rem, 9vw, 4rem);
        line-height: 1.05;
        color: var(--plum);
        text-shadow: 0 3px 0 rgba(255, 255, 255, 0.6);
      }
      .title .em {
        color: var(--rose-deep);
      }

      .ribbon {
        font-family: var(--font-hand);
        font-size: clamp(1.15rem, 4.6vw, 1.7rem);
        color: var(--plum-soft);
        min-height: 2.6em;
        max-width: 24ch;
        display: flex;
        align-items: center;
        justify-content: center;
        text-wrap: balance;
        transition:
          opacity 0.6s ease,
          transform 0.6s ease;
      }
      .ribbon.swap {
        opacity: 0;
        transform: translateY(8px);
      }

      .hint {
        font-family: var(--font-ui);
        font-size: clamp(0.78rem, 3vw, 0.95rem);
        letter-spacing: 0.02em;
        color: var(--plum-soft);
        opacity: 0.85;
      }

      .wishes {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: clamp(0.7rem, 2.6vw, 1.1rem);
        width: min(440px, 92vw);
        margin-top: 0.3rem;
      }
      .wish {
        position: relative;
        font-family: var(--font-hand);
        font-size: clamp(1.05rem, 4.4vw, 1.45rem);
        font-weight: 700;
        color: var(--plum);
        background: var(--glass);
        border: 1.5px solid var(--glass-line);
        border-radius: 26px;
        padding: clamp(0.9rem, 3.6vw, 1.3rem) 0.6rem
          clamp(0.8rem, 3.2vw, 1.15rem);
        cursor: pointer;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35em;
        transition:
          transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.25s ease,
          background 0.25s ease;
        overflow: hidden;
      }
      .wish .ico {
        font-size: clamp(1.9rem, 8vw, 2.6rem);
        line-height: 1;
      }
      .wish::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          160deg,
          rgba(255, 255, 255, 0.5),
          transparent 60%
        );
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      .wish:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: var(--shadow);
        background: rgba(255, 255, 255, 0.7);
      }
      .wish:hover::before {
        opacity: 1;
      }
      .wish:active {
        transform: scale(0.96);
      }
      .wish.pop {
        animation: pop 0.5s ease;
      }
      @keyframes pop {
        0% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.08);
        }
        100% {
          transform: scale(1);
        }
      }
      .wish:focus-visible {
        outline: 3px solid var(--rose);
        outline-offset: 3px;
      }

      /* =====================================================================
   ТОСТ + ЧАСТИЦЫ
   ===================================================================== */
      .toast {
        position: fixed;
        left: 50%;
        bottom: max(28px, env(safe-area-inset-bottom));
        transform: translate(-50%, 140%);
        z-index: 40;
        font-family: var(--font-hand);
        font-weight: 700;
        font-size: clamp(1.05rem, 4vw, 1.35rem);
        color: #fff;
        background: linear-gradient(135deg, var(--rose), var(--rose-deep));
        padding: 0.7em 1.4em;
        border-radius: 999px;
        box-shadow: var(--shadow);
        white-space: nowrap;
        transition:
          transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.4s ease;
        opacity: 0;
      }
      .toast.show {
        transform: translate(-50%, 0);
        opacity: 1;
      }

      .burst {
        position: fixed;
        z-index: 35;
        pointer-events: none;
        font-size: 1.4rem;
        will-change: transform, opacity;
      }
      .pburst {
        position: absolute;
        pointer-events: none;
        will-change: transform, opacity;
      }
      @keyframes burstUp {
        0% {
          transform: translate(0, 0) scale(0.6) rotate(0);
          opacity: 1;
        }
        100% {
          transform: translate(var(--bx), var(--by)) scale(1.1)
            rotate(var(--br));
          opacity: 0;
        }
      }

      /* =====================================================================
   КНОПКА ИГР + ОВЕРЛЕИ
   ===================================================================== */
      .game-fab {
        position: fixed;
        right: 14px;
        bottom: max(14px, env(safe-area-inset-bottom));
        z-index: 22;
        font-family: var(--font-hand);
        font-weight: 700;
        font-size: 1.05rem;
        color: var(--plum);
        background: var(--glass);
        border: 1.5px solid var(--glass-line);
        border-radius: 999px;
        padding: 0.55em 1em;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.4em;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        box-shadow: var(--shadow-sm);
      }
      .game-fab:active {
        transform: scale(0.95);
      }
      .game-fab:focus-visible {
        outline: 3px solid var(--rose);
        outline-offset: 3px;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 55;
        display: flex;
        flex-direction: column;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
        background: linear-gradient(
          160deg,
          var(--blush) 0%,
          var(--cream) 55%,
          var(--petal) 120%
        );
      }
      .overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      #game {
        z-index: 60;
      }

      .hub-close,
      .icon-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 1.5px solid var(--glass-line);
        background: var(--glass);
        cursor: pointer;
        font-size: 1.2rem;
        color: var(--plum);
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }
      .hub-close {
        position: absolute;
        top: 14px;
        right: 16px;
        z-index: 2;
      }
      .icon-btn:active,
      .hub-close:active {
        transform: scale(0.92);
      }
      .icon-btn:focus-visible,
      .hub-close:focus-visible,
      .game-card:focus-visible {
        outline: 3px solid var(--rose);
        outline-offset: 3px;
      }

      .hub-inner {
        margin: auto;
        width: min(440px, 92vw);
        text-align: center;
        padding: 6vw 4vw;
      }
      .hub-title {
        font-family: var(--font-script);
        font-size: clamp(2rem, 8vw, 3rem);
        color: var(--plum);
        margin-bottom: 0.6em;
      }
      .hub-grid {
        display: grid;
        gap: 14px;
      }
      .game-card {
        display: flex;
        align-items: center;
        gap: 14px;
        text-align: left;
        background: var(--glass);
        border: 1.5px solid var(--glass-line);
        border-radius: 22px;
        padding: 16px;
        cursor: pointer;
        box-shadow: var(--shadow-sm);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .game-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow);
      }
      .game-card:active {
        transform: scale(0.98);
      }
      .game-card .gc-ico {
        font-size: 2.2rem;
        flex: 0 0 auto;
      }
      .game-card .gc-t {
        font-family: var(--font-hand);
        font-weight: 700;
        font-size: 1.3rem;
        color: var(--plum);
      }
      .game-card .gc-d {
        font-family: var(--font-ui);
        font-size: 0.82rem;
        color: var(--plum-soft);
      }

      .game-head {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: max(14px, env(safe-area-inset-top)) 16px 8px;
      }
      .game-title {
        font-family: var(--font-hand);
        font-weight: 700;
        font-size: 1.3rem;
        color: var(--plum);
        flex: 1;
        text-align: left;
      }
      .scorebox {
        font-family: var(--font-ui);
        font-weight: 600;
        color: var(--plum-soft);
        font-size: 0.95rem;
      }
      .meterwrap {
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.55);
        margin: 0 16px 6px;
        overflow: hidden;
      }
      .meterfill {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, var(--rose), var(--rose-deep));
        transition: width 0.25s ease;
      }
      .game-stage {
        position: relative;
        flex: 1;
        margin: 8px 12px max(12px, env(safe-area-inset-bottom));
        border-radius: 24px;
        overflow: hidden;
        touch-action: none;
        background: rgba(255, 255, 255, 0.28);
        border: 1.5px solid var(--glass-line);
      }

      /* Котопад */
      .catcher {
        position: absolute;
        bottom: 10px;
        left: 0;
        font-size: 2.6rem;
        will-change: transform;
        pointer-events: none;
      }
      .falling {
        position: absolute;
        top: 0;
        left: 0;
        font-size: 1.9rem;
        will-change: transform;
        pointer-events: none;
      }

      /* Пузырьки */
      .bubble {
        position: absolute;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        color: #fff;
        background: radial-gradient(
          circle at 32% 28%,
          rgba(255, 255, 255, 0.92),
          rgba(255, 182, 205, 0.5) 60%,
          rgba(225, 92, 134, 0.42)
        );
        box-shadow:
          0 6px 16px rgba(225, 92, 134, 0.25),
          inset 0 0 12px rgba(255, 255, 255, 0.55);
      }
      .bubble.gold {
        background: radial-gradient(
          circle at 32% 28%,
          #fff7da,
          #ffd86b 60%,
          #f0a800
        );
        box-shadow:
          0 6px 18px rgba(240, 168, 0, 0.45),
          inset 0 0 12px rgba(255, 255, 255, 0.6);
      }
      .bub-label {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translate(-50%, -8px);
        background: var(--glass);
        border: 1.5px solid var(--glass-line);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        padding: 0.6em 1em;
        border-radius: 18px;
        max-width: 88%;
        text-align: center;
        font-family: var(--font-hand);
        font-weight: 700;
        font-size: clamp(1rem, 4vw, 1.3rem);
        color: var(--plum);
        box-shadow: var(--shadow-sm);
        opacity: 0;
        transition:
          opacity 0.35s ease,
          transform 0.35s ease;
        z-index: 3;
      }
      .bub-label.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }
      .bub-label.gold {
        color: var(--rose-deep);
        border-color: #ffd86b;
      }

      /* Парочки */
      .mwrap {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 10px;
        gap: 10px;
      }
      .mphrase {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3em;
        justify-content: center;
        align-items: center;
        min-height: 1.6em;
        font-family: var(--font-hand);
        font-weight: 700;
        font-size: clamp(1rem, 4.2vw, 1.4rem);
        color: var(--plum-soft);
      }
      .mslot {
        opacity: 0.35;
        transition:
          opacity 0.3s,
          transform 0.3s,
          color 0.3s;
      }
      .mslot.on {
        opacity: 1;
        color: var(--rose-deep);
        transform: scale(1.06);
      }
      .mgrid {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        align-content: center;
        width: min(420px, 100%);
        margin: 0 auto;
      }
      .mcard {
        position: relative;
        border: none;
        border-radius: 16px;
        cursor: pointer;
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(1.4rem, 7vw, 2rem);
        background: linear-gradient(160deg, var(--rose), var(--rose-deep));
        box-shadow: var(--shadow-sm);
        transition:
          background 0.2s ease,
          transform 0.15s ease;
      }
      .mcard:active {
        transform: scale(0.95);
      }
      .mcard::after {
        content: "🤍";
        position: absolute;
        font-size: clamp(1.2rem, 6vw, 1.7rem);
        opacity: 0.9;
        transition: opacity 0.2s;
      }
      .mcard .mface {
        opacity: 0;
        transform: scale(0.5);
        transition:
          opacity 0.2s,
          transform 0.2s;
      }
      .mcard.flipped,
      .mcard.matched {
        background: var(--glass);
        border: 1.5px solid var(--glass-line);
      }
      .mcard.flipped::after,
      .mcard.matched::after {
        opacity: 0;
      }
      .mcard.flipped .mface,
      .mcard.matched .mface {
        opacity: 1;
        transform: scale(1);
      }
      .mcard.matched {
        box-shadow:
          0 0 0 2px var(--rose) inset,
          var(--shadow-sm);
      }

      /* Поп-ап победы */
      .gpopup {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 240, 246, 0.72);
        -webkit-backdrop-filter: blur(6px);
        backdrop-filter: blur(6px);
        z-index: 5;

      /* ---------- помощники ---------- */
      const $ = (s) => document.querySelector(s);
      const rnd = (a, b) => Math.random() * (b - a) + a;
      const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
      const shuffle = (a) => {
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }

      (function makeSky() {
        const sky = $("#sky");
        const count = window.innerWidth < 480 ? 16 : 26;
        for (let i = 0; i < count; i++) {
          const s = document.createElement("span");
          s.className = "float";
          s.textContent = pick(FLOAT_GLYPHS);
          s.style.left = rnd(0, 100) + "vw";
          s.style.fontSize = rnd(1.1, 2.4) + "rem";
          s.style.animationDuration = rnd(9, 20) + "s";

          sky.appendChild(s);

      })();

      /* ---------- интро ---------- */
      $("#introCompliment").textContent = pick(COMPLIMENTS);
      let entered = false;

        if (entered) return;
        entered = true;
        $("#intro").classList.add("hide");

        stage.classList.add("show");
        stage.setAttribute("aria-hidden", "false");
        startRibbon();

        if (e.key === "Enter" || e.key === " ") enter();
      });

      /* ---------- лента комплиментов ---------- */
      function startRibbon() {
        const el = $("#ribbon");
        let pool = shuffle([...COMPLIMENTS]);
        let i = 0;
        const next = () => {
          el.textContent = pool[i % pool.length];
          i++;
        };
        next();
        setInterval(() => {
          el.classList.add("swap");
          setTimeout(() => {
            next();
            el.classList.remove("swap");
          }, 600);
        }, 4200);
      }

      /* ---------- кнопки-желания ---------- */

      /* ---------- сердечки-частицы (на главной, fixed) ---------- */
      function heartBurst(x, y, glyph) {
        const glyphs = [glyph, "💗", "💕", "🌸", "✨", "🤍"];
        for (let i = 0; i < 16; i++) {
          const p = document.createElement("span");

          p.style.left = x + "px";
          p.style.top = y + "px";
          const ang = rnd(0, Math.PI * 2),
            dist = rnd(60, 170);
          p.style.setProperty("--bx", Math.cos(ang) * dist + "px");
          p.style.setProperty(
            "--by",
            Math.sin(ang) * dist - rnd(40, 120) + "px",
          );
          p.style.setProperty("--br", rnd(-180, 180) + "deg");
          p.style.fontSize = rnd(1, 2) + "rem";
          p.style.animation = `burstUp ${rnd(0.8, 1.3)}s ease-out forwards`;
          document.body.appendChild(p);
          setTimeout(() => p.remove(), 1400);
        }
      }

      /* частицы внутри игрового поля (absolute) */
      function burstIn(stage, x, y) {
        for (let i = 0; i < 9; i++) {

      /* =====================================================================

      let audioCtx;
      function getCtx() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
        return audioCtx;
      }
      function meowSound() {
        let ctx;
        try {
          ctx = getCtx();
        } catch (e) {
          return;
        }
        const t0 = ctx.currentTime,
          dur = 0.55 + Math.random() * 0.12,
          base = 460 + Math.random() * 130;
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, t0);
        master.gain.exponentialRampToValueAtTime(0.3, t0 + 0.04);
        master.gain.setValueAtTime(0.3, t0 + dur * 0.5);
        master.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        const lp = ctx.createBiquadFilter();
        lp.type = "lowpass";
        lp.Q.value = 7;
        lp.frequency.setValueAtTime(1400, t0);
        lp.frequency.linearRampToValueAtTime(2800, t0 + dur * 0.25);
        lp.frequency.linearRampToValueAtTime(800, t0 + dur);
        master.connect(lp);
        lp.connect(ctx.destination);
        const lfo = ctx.createOscillator();
        lfo.frequency.value = 17;
        const lfoGain = ctx.createGain();
        lfoGain.gain.setValueAtTime(0, t0);
        lfoGain.gain.setValueAtTime(0, t0 + dur * 0.45);
        lfoGain.gain.linearRampToValueAtTime(18, t0 + dur);
        lfo.connect(lfoGain);
        lfo.start(t0);
        lfo.stop(t0 + dur + 0.05);
        [
          ["sawtooth", 0, 0.6],
          ["triangle", 6, 0.45],
        ].forEach(([type, det, g]) => {
          const osc = ctx.createOscillator();
          osc.type = type;
          osc.detune.value = det;
          osc.frequency.setValueAtTime(base * 0.85, t0);
          osc.frequency.linearRampToValueAtTime(base * 1.3, t0 + dur * 0.16);
          osc.frequency.setValueAtTime(base * 1.22, t0 + dur * 0.42);
          osc.frequency.linearRampToValueAtTime(base * 0.68, t0 + dur);
          lfoGain.connect(osc.frequency);
          const og = ctx.createGain();
          og.gain.value = g;
          osc.connect(og);
          og.connect(master);
          osc.start(t0);
          osc.stop(t0 + dur + 0.05);
        });
      }
      function popSound() {
        let ctx;
        try {
          ctx = getCtx();
        } catch (e) {
          return;
        }
        const t = ctx.currentTime;
        const o = ctx.createOscillator(),
          g = ctx.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(620 + Math.random() * 200, t);
        o.frequency.exponentialRampToValueAtTime(180, t + 0.12);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.14, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
        o.connect(g);
        g.connect(ctx.destination);
        o.start(t);
        o.stop(t + 0.18);
      }
      function chime() {
        let ctx;
        try {
          ctx = getCtx();
        } catch (e) {
          return;
        }
        const t = ctx.currentTime;
        [880, 1320].forEach((f, i) => {
          const o = ctx.createOscillator(),
            g = ctx.createGain();
          o.type = "triangle";
          o.frequency.value = f;
          const s = t + i * 0.08;
          g.gain.setValueAtTime(0.0001, s);
          g.gain.exponentialRampToValueAtTime(0.11, s + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, s + 0.25);
          o.connect(g);
          g.connect(ctx.destination);
          o.start(s);
          o.stop(s + 0.3);
        });
      }

      /* котик */
      const kitty = $("#kitty");
      let soundReady = false;
      if (CONFIG.soundFile) {
        const probe = new Audio(CONFIG.soundFile);
        probe.preload = "auto";
        probe.addEventListener(
          "canplaythrough",
          () => {
            soundReady = true;
          },
          { once: true },
        );
        probe.addEventListener("error", () => {
          soundReady = false;
        });
      }
      function playMeow() {
        if (soundReady) {
          const a = new Audio(CONFIG.soundFile);
          a.volume = 0.9;
          a.play().catch(() => meowSound());
        } else meowSound();
      }
      function petKitty() {
        playMeow();
        kitty.classList.remove("mew");
        void kitty.offsetWidth;
        kitty.classList.add("mew");
        const r = kitty.getBoundingClientRect();
        const b = document.createElement("span");
        b.className = "mew-bubble";
        b.textContent = pick(["Мяу~", "Мур~", "Мяу!", "Мрр~"]);
        b.style.left = r.left + r.width * 0.55 + "px";
        b.style.top = r.top - 4 + "px";
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 1200);
        heartBurst(r.left + r.width / 2, r.top + r.height / 3, "🐾");
      }
      kitty.addEventListener("click", petKitty);
      kitty.addEventListener("animationend", () =>
        kitty.classList.remove("mew"),
      );

      /* =====================================================================
   УВЕДОМЛЕНИЯ
   ===================================================================== */
      async function notify(word, ico) {
        const when = new Date().toLocaleString("ru-RU");
        const text = `💕 ${CONFIG.name || "Она"} нажала «${word}» ${ico}\n🕒 ${when}`;
        const tg = CONFIG.telegram;
        if (tg && tg.token && tg.chatId) {
          try {
            await fetch(`https://api.telegram.org/bot${tg.token}/sendMessage`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ chat_id: tg.chatId, text }),
            });
          } catch (err) {
            console.warn("Telegram:", err);
          }
        }
        const fs = CONFIG.formspree;
        if (fs && fs.endpoint) {
          try {
            await fetch(fs.endpoint, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Accept: "application/json",
              },
              body: JSON.stringify({
                желание: word,
                время: when,
                сообщение: text,
              }),
            });
          } catch (err) {
            console.warn("Formspree:", err);
          }
        }
      }

      /* =====================================================================
   ХАБ ИГР + ПЕРЕКЛЮЧЕНИЕ
   ===================================================================== */
      const fab = $("#fab"),
        hub = $("#hub"),
        gameOv = $("#game"),
        gStage = $("#gStage");
      const gTitle = $("#gTitle"),
        gScore = $("#gScore"),
        gMeterWrap = $("#gMeterWrap"),
        gMeter = $("#gMeter");
      let activeGame = null;

      function setGameTitle(t) {
        gTitle.textContent = t;
      }
      function setScore(n) {
        gScore.textContent = n;
      }
      function showMeter(on) {
        gMeterWrap.style.display = on ? "" : "none";
      }
      function setMeter(p) {
        gMeter.style.width = Math.min(100, p) + "%";
      }
      function showBubbleLabel(stage, text, gold) {
        const old = stage.querySelector(".bub-label");
        if (old) old.remove();
        const l = document.createElement("div");
        l.className = "bub-label" + (gold ? " gold" : "");
        l.textContent = text;
        stage.appendChild(l);
        requestAnimationFrame(() => l.classList.add("show"));
        setTimeout(() => {
          l.classList.remove("show");
          setTimeout(() => l.remove(), 400);
        }, 1800);
      }
      function showGameWin(stage, text, onAgain) {
        const o = document.createElement("div");
        o.className = "gpopup";
        o.innerHTML = `<div class="gpopup-card"><div class="gpopup-emoji">💞</div>
    <p class="gpopup-text">${text}</p>
    <button class="gpopup-btn" type="button">Сыграть ещё 🌸</button></div>`;
        o.querySelector(".gpopup-btn").addEventListener("click", onAgain);
        stage.appendChild(o);
      }

      function openHub() {
        hub.classList.add("show");
      }
      function closeHub() {
        hub.classList.remove("show");
      }
      function stopGame() {
        if (activeGame && activeGame.stop) activeGame.stop();
        activeGame = null;
        gStage.innerHTML = "";
      }
      function exitToHub() {
        stopGame();
        gameOv.classList.remove("show");
        openHub();
      }
      function openGame(name) {
        stopGame();
        closeHub();
        gameOv.classList.add("show");
        if (name === "catch") activeGame = gameCatch(gStage);
        else if (name === "bubbles") activeGame = gameBubbles(gStage);
        else if (name === "memory") activeGame = gameMemory(gStage);
      }
      fab.addEventListener("click", openHub);
      $("#hubClose").addEventListener("click", closeHub);
      $("#gBack").addEventListener("click", exitToHub);
      document
        .querySelectorAll(".game-card")
        .forEach((c) =>
          c.addEventListener("click", () => openGame(c.dataset.game)),
        );

      /* =====================================================================
   ИГРА 1 — КОТОПАД
   ===================================================================== */
      function gameCatch(stage) {
        setGameTitle("Котопад 🧺");
        showMeter(true);
        setScore(0);
        setMeter(0);
        const GOOD = ["🍓", "🍰", "🐟", "🌸", "🧶", "🍪", "🍡"];
        const catcher = document.createElement("div");
        catcher.className = "catcher";
        catcher.textContent = "🐱";
        stage.appendChild(catcher);

        let cx = stage.getBoundingClientRect().width / 2;
        const place = () => {
          catcher.style.transform = `translateX(${cx - 22}px)`;
        };
        place();
        const onMove = (e) => {
          const r = stage.getBoundingClientRect();
          cx = Math.max(24, Math.min(r.width - 24, e.clientX - r.left));
          place();
        };
        stage.addEventListener("pointermove", onMove);
        stage.addEventListener("pointerdown", onMove);

        let items = [],
          score = 0,
          meter = 0;
        let running = true,
          rafId = 0,
          lastT = performance.now(),
          spawnAcc = 0;

        function spawn() {
          const r = stage.getBoundingClientRect();
          const heart = Math.random() < 0.32;
          const el = document.createElement("span");
          el.className = "falling";
          el.textContent = heart ? "💕" : pick(GOOD);
          const x = 18 + Math.random() * (r.width - 40);
          el.style.transform = `translate(${x}px,-30px)`;
          stage.appendChild(el);
          items.push({ el, x, y: -30, heart });
        }
        function caught(it) {
          score += it.heart ? 2 : 1;
          setScore(score);
          meter += it.heart ? 16 : 6;
          popSound();
          burstIn(stage, it.x, it.y);
          if (meter >= 100) {
            meter = 0;
            playMeow();
            showBubbleLabel(stage, pick(COMPLIMENTS), false);
          }
          setMeter(meter);
        }
        function frame(now) {
          if (!running) return;
          const dt = Math.min(0.05, (now - lastT) / 1000);
          lastT = now;
          spawnAcc += dt;
          const every = Math.max(0.42, 0.82 - score * 0.008);
          if (spawnAcc >= every) {
            spawnAcc = 0;
            spawn();
          }
          const r = stage.getBoundingClientRect();
          const catchY = r.height - 44;
          for (let i = items.length - 1; i >= 0; i--) {
            const it = items[i];
            it.y += (140 + score * 3) * dt;
            it.el.style.transform = `translate(${it.x}px,${it.y}px)`;
            if (
              it.y >= catchY - 30 &&
              it.y <= catchY + 20 &&
              Math.abs(it.x - cx) < 46
            ) {
              caught(it);
              it.el.remove();
              items.splice(i, 1);
            } else if (it.y > r.height + 50) {
              it.el.remove();
              items.splice(i, 1);
            }
          }
          rafId = requestAnimationFrame(frame);
        }
        rafId = requestAnimationFrame(frame);

        return {
          stop() {
            running = false;
            cancelAnimationFrame(rafId);
            stage.removeEventListener("pointermove", onMove);
            stage.removeEventListener("pointerdown", onMove);
          },
        };
      }

      /* =====================================================================
   ИГРА 2 — ПУЗЫРЬКИ-КОМПЛИМЕНТЫ
   ===================================================================== */
      function gameBubbles(stage) {
        setGameTitle("Пузырьки 🫧");
        showMeter(false);
        setScore(0);
        let popped = 0,
          running = true,
          spawnId = 0;
        const pool = shuffle([...COMPLIMENTS]);
        let pi = 0;
        const nextC = () => {
          const c = pool[pi % pool.length];
          pi++;
          return c;
        };

        function spawn() {
          if (!running) return;
          const r = stage.getBoundingClientRect();
          const gold = Math.random() < 0.08;
          const size = 46 + Math.random() * 38;
          const b = document.createElement("button");
          b.type = "button";
          b.className = "bubble" + (gold ? " gold" : "");
          b.style.width = b.style.height = size + "px";
          b.style.left = 10 + Math.random() * (r.width - size - 20) + "px";
          b.style.bottom = "-90px";
          b.textContent = gold ? "🎁" : "💗";
          const dur = 6000 + Math.random() * 4500;
          b.style.transition = `bottom ${dur}ms linear, opacity .35s ease`;
          stage.appendChild(b);
          requestAnimationFrame(() => {
            b.style.bottom = r.height + 100 + "px";
          });
          const rm = setTimeout(() => b.remove(), dur + 250);
          b.addEventListener("click", () => {
            clearTimeout(rm);
            popSound();
            chime();
            popped++;
            setScore(popped);
            burstAtEl(b, stage);
            if (gold) {
              const c = pick(COUPONS);
              showBubbleLabel(stage, `Купон: ${c.word} ${c.ico} 💌`, true);
              notify("купон — " + c.word, c.ico);
            } else {
              showBubbleLabel(stage, nextC(), false);
            }
            b.remove();
          });
        }
        spawnId = setInterval(spawn, 850);
        spawn();
        return {
          stop() {
            running = false;
            clearInterval(spawnId);
          },
        };
      }

      /* =====================================================================
   ИГРА 3 — ПАРОЧКИ (память)
   ===================================================================== */
      function gameMemory(stage) {
        setGameTitle("Парочки 🃏");
        showMeter(false);
        setScore(0);
        const ICONS = ["🌸", "🐱", "💋", "🍓", "🌷", "🤍", "🦋", "🍰"];
        const WORDS = [
          "Ты",
          "моё",
          "самое",
          "любимое",
          "чудо",
          "на",
          "этом",
          "свете 💕",
        ];
        const wordOf = {};
        ICONS.forEach((ic, i) => (wordOf[ic] = i));

        const wrap = document.createElement("div");
        wrap.className = "mwrap";
        const phrase = document.createElement("div");
        phrase.className = "mphrase";
        const slots = WORDS.map(() => {
          const s = document.createElement("span");
          s.className = "mslot";
          s.textContent = "•";
          phrase.appendChild(s);
          return s;
        });
        const grid = document.createElement("div");
        grid.className = "mgrid";
        const deck = shuffle([...ICONS, ...ICONS].map((ic) => ({ ic })));

        let moves = 0,
          matched = 0,
          lock = false,
          first = null;

        deck.forEach((card) => {
          const el = document.createElement("button");
          el.type = "button";
          el.className = "mcard";
          el.innerHTML = `<span class="mface">${card.ic}</span>`;
          el.addEventListener("click", () => flip(card, el));
          card.el = el;
          grid.appendChild(el);
        });
        wrap.appendChild(phrase);
        wrap.appendChild(grid);
        stage.appendChild(wrap);

        function flip(card, el) {
          if (
            lock ||
            el.classList.contains("flipped") ||
            el.classList.contains("matched")
          )
            return;
          el.classList.add("flipped");
          popSound();
          if (!first) {
            first = { card, el };
            return;
          }
          moves++;
          setScore(moves);
          if (first.card.ic === card.ic) {
            first.el.classList.add("matched");
            el.classList.add("matched");
            const wi = wordOf[card.ic];
            slots[wi].textContent = WORDS[wi];
            slots[wi].classList.add("on");
            chime();
            first = null;
            matched++;
            if (matched === ICONS.length) setTimeout(win, 550);
          } else {
            lock = true;
            const a = first;
            first = null;
            setTimeout(() => {
              a.el.classList.remove("flipped");
              el.classList.remove("flipped");
              lock = false;
            }, 750);
          }
        }
        function win() {
          playMeow();
          petalShower(stage);
          showGameWin(stage, WORDS.join(" "), () => openGame("memory"));
        }
        return { stop() {} };
      }
    </script>
  </body>
